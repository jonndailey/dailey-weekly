services:
  db:
    image: mysql:8.4
    container_name: dailey-template-blog-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - blog_mysql_data:/var/lib/mysql

volumes:
  blog_mysql_data:
